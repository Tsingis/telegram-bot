name: package
on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "Pipfile*"
      - "requirements.txt"
      - "serverless/**"
      - ".github/workflows/package.yml"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  NO_UPDATE_NOTIFIER: true
jobs:
  package:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
      fail-fast: false
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          architecture: "x64"
          cache: "pipenv"
          cache-dependency-path: Pipfile.lock
      - name: Install pipenv
        run: pip install --prefer-binary -r requirements.txt
      - name: Create requirements
        run: pipenv requirements > ${{ github.workspace }}/serverless/requirements.txt
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: serverless/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ./serverless
      - name: Package
        id: package
        run: npm run package -- --package ${{ runner.temp }}
        working-directory: ./serverless
        env:
          SERVERLESS_LICENSE_KEY: ${{ secrets.SERVERLESS_LICENSE_KEY }}
          DOCKERIZE: ${{ matrix.os != 'windows-latest' && 'true' || 'false' }}
      - name: Validate package contents
        run: python validate.py ${{ runner.temp }}/telegram-bot.zip
        working-directory: ./serverless
      - name: Review package
        if: steps.package.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.os }}-package
          path: ${{ runner.temp }}/telegram-bot.zip
          overwrite: true
          retention-days: 1
